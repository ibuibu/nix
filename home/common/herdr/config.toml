# herdr configuration
# tmux と同じキーバインドに揃える設定。
# tmux 側の設定は home/darwin/default.nix / home/linux/tmux/default.nix を参照。

[keys]
# tmux prefix: C-Space
prefix = "ctrl+space"

# ペイン移動 (tmux: bind h/j/k/l select-pane -L/-D/-U/-R)
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"

# 新規ウィンドウ/タブ (tmux: bind c new-window)
new_tab = "prefix+c"

# ペイン分割
# tmux: bind \ split-window -h → 左右分割 = herdr split_vertical(右方向へ分割)
# tmux: bind - split-window -v → 上下分割 = herdr split_horizontal(下方向へ分割)
split_vertical = "prefix+backslash"
split_horizontal = "prefix+minus"

# コピーモード (tmux: bind Space copy-mode)
# 補足: tmux の bind C-Space copy-mode は herdr では設定不可。
#   prefix 自体が ctrl+space のため "prefix+ctrl+space" は prefix の2度押し扱いとなり、
#   diagnostic 警告が出て全キーバインドがデフォルト(ctrl+b)に戻ってしまう。
copy_mode = "prefix+space"

# 補足: tmux の以下は herdr に対応機能がないため未設定
#   - リサイズ H/J/K/L (herdr は prefix+r のリサイズモード内で h/j/k/l)
#   - synchronize-panes (bind e / E)

# カスタムコマンド
# type = "pane": 一時ペインでコマンドを開き、終了時に自動で閉じる。
#   タブを増やさず Agent ペインの上から lazygit 等を使える。
[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"
description = "run lazygit"
